<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso administración</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f4f4f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #fff;
        border: 1px solid #e0ddd6;
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 360px;
      }
      h1 {
        font-size: 1.3rem;
        margin-bottom: 1.5rem;
        color: #1a1a1a;
        text-align: center;
      }
      label {
        font-size: 0.8rem;
        color: #555;
        display: block;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d4d1cb;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        outline: none;
      }
      input:focus {
        border-color: #7f77dd;
        box-shadow: 0 0 0 3px rgba(127, 119, 221, 0.12);
      }
      button {
        width: 100%;
        padding: 10px;
        background: #534ab7;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #3c3489;
      }
      .error {
        color: #c0392b;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🔒 Administración</h1>
      <p class="error" id="error">Contraseña incorrecta</p>
      <label>Contraseña</label>
      <input type="password" id="pass" placeholder="Introduce la contraseña" />
      <button onclick="entrar()">Entrar</button>
    </div>
    <script>
      function entrar() {
        const pass = document.getElementById("pass").value;
        if (!pass) return;
        window.location.href = "/admin?pass=" + encodeURIComponent(pass);
      }
      document.getElementById("pass").addEventListener("keydown", (e) => {
        if (e.key === "Enter") entrar();
      });
      if (window.location.search.includes("pass=")) {
        document.getElementById("error").style.display = "block";
      }
    </script>
  </body>
</html>
